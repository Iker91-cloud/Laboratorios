name: Lab 3 - Matrix Build Enterprise

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-enterprise:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18, 20]
        mode: [debug, release]
        
        exclude:
          - os: windows-latest
            node-version: 18
            mode: debug
            
        include:
          - os: ubuntu-latest
            node-version: 20
            mode: release
            environment: production
            extra_var: "prod-secret-key"

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Ejecutar build simulado
        shell: bash
        run: |
          echo "Iniciando build en SO: ${{ matrix.os }}"
          echo "Modo: ${{ matrix.mode }}"
          echo "Entorno: ${{ matrix.environment || 'development' }}"

      - name: Generar Job Summary
        shell: bash
        run: |
          echo "### 🚀 Resumen de Ejecución para ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Configuración ejecutada:** SO=${{ matrix.os }}, Node=${{ matrix.node-version }}, Modo=${{ matrix.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resultado:** Éxito" >> $GITHUB_STEP_SUMMARY
          echo "- **Tiempo estimado:** ~1 minuto" >> $GITHUB_STEP_SUMMARY
          echo "- **Información extra de matrix:** Entorno=${{ matrix.environment || 'N/A' }}, Var Adicional=${{ matrix.extra_var || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
