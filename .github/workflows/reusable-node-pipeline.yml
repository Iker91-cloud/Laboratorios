name: Reusable Node.js Pipeline

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
        description: "Versión de Node.js a utilizar (ej. 18.x)"
      artifact-name:
        required: false
        type: string
        default: "app-build"
        description: "Prefijo del nombre del artefacto"
    outputs:
      test-outcome:
        description: "Resultado del paso de testing"
        value: ${{ jobs.build-test.outputs.test-status }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      test-status: ${{ steps.run-tests.outcome }}
    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: 3. Configurar Cache de dependencias
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ inputs.node-version }}-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ inputs.node-version }}-

      - name: 4. Instalar dependencias
        run: npm install # Cambiado a npm install por si no existe package-lock.json

      - name: 5. Ejecutar Tests y generar reporte
        id: run-tests
        continue-on-error: true
        # El "|| true" evita que un fallo en los tests devuelva Exit Code 1 al sistema y rompa el pipeline
        run: npm test > test-report.log 2>&1 || true 

      - name: 6. Compilar proyecto
        run: npm run build --if-present

      - name: 7. Subir Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-node-${{ inputs.node-version }}
          path: |
            dist/
            test-report.log
          retention-days: 5
          if-no-files-found: warn # Solo avisa si no encuentra la carpeta dist/, pero no rompe el pipeline
