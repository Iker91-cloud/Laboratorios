name: CI Consumer Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Llamada 1: Node 18
  build-node-18:
    uses: ./.github/workflows/reusable-node-pipeline.yml
    with:
      node-version: '18.x'
      artifact-name: 'frontend-app'

  # Llamada 2: Node 20
  build-node-20:
    uses: ./.github/workflows/reusable-node-pipeline.yml
    with:
      node-version: '20.x'
      artifact-name: 'frontend-app'

  # Lógica propia adicional que consume los outputs
  evaluar-resultados:
    runs-on: ubuntu-latest
    needs: [build-node-18, build-node-20]
    steps:
      - name: Analizar outputs de los workflows reutilizables
        run: |
          echo "=== Reporte de Ejecución ==="
          echo "Status de tests en Node 18: ${{ needs.build-node-18.outputs.test-outcome }}"
          echo "Status de tests en Node 20: ${{ needs.build-node-20.outputs.test-outcome }}"
          
      - name: Lógica adicional (Simulación de despliegue)
        if: ${{ needs.build-node-20.outputs.test-outcome == 'success' }}
        run: echo "Los tests pasaron o se omitieron correctamente. Despliegue simulado..."
